<!doctype html><html><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Player - Simple Link Fight</title>
<style>
  body{font:14px system-ui;margin:0;background:#f5f5f5}
  .wrap{max-width:900px;margin:16px auto;padding:12px}
  h2{margin:6px 0 10px}
  .card{border:1px solid #ddd;border-radius:10px;padding:12px;margin:12px 0;background:#fff}
  label{display:block;font-size:12px;color:#444;margin:8px 0 4px}
  input,button,select{padding:8px;width:100%}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .row>div{flex:1 1 180px}
  .meter{height:20px;background:#eee;border-radius:10px;overflow:hidden;margin:8px 0}
  .fill{height:100%;width:0%;background:linear-gradient(90deg,#c00,#cc0,#0a0);transition:width 0.3s}
  .kv{font-size:12px;color:#666}
  .value-display{font-family:monospace;font-weight:bold;color:#333;font-size:14px;padding:4px 8px;background:#f0f0f0;border-radius:5px;text-align:center;min-width:40px}
  .status-joined{color:#0a0;font-weight:500}
  .help-text{font-size:11px;color:#888;margin-top:8px}

  /* New layout styles */
  .antenna-control-panel{display:flex;flex-direction:column;gap:12px}
  .azimuth-bar{display:flex;align-items:center;gap:12px;padding:12px;background:#2a2a2a;border-radius:8px}
  .azimuth-bar label{color:#aaa;margin:0;white-space:nowrap;font-weight:bold}
  .azimuth-slider{flex:1;height:8px;-webkit-appearance:none;background:#444;border-radius:4px;cursor:pointer}
  .azimuth-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#4488ff;border-radius:50%;cursor:pointer}
  .azimuth-slider::-moz-range-thumb{width:20px;height:20px;background:#4488ff;border-radius:50%;cursor:pointer;border:none}
  .azimuth-input{width:80px;text-align:center;font-family:monospace;font-size:14px;padding:6px 8px;border:1px solid #555;border-radius:4px;background:#333;color:#fff}
  .azimuth-bar .unit{color:#888;font-size:12px}

  .viz-container{display:flex;gap:12px;min-height:450px}
  .sidebar{display:flex;flex-direction:column;align-items:center;justify-content:space-between;width:70px;background:#2a2a2a;border-radius:8px;padding:16px 8px}
  .sidebar label{color:#aaa;font-size:11px;font-weight:bold;margin:0}
  .sidebar .value-display{background:#333;color:#fff;font-size:12px;min-width:30px}
  .sidebar .range-labels{display:flex;flex-direction:column;align-items:center;height:100%;justify-content:space-between;font-size:10px;color:#666}

  .vertical-slider{writing-mode:vertical-lr;height:200px;-webkit-appearance:none;background:#444;border-radius:4px;cursor:pointer;width:8px;transform:rotate(180deg)}
  .vertical-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#4488ff;border-radius:50%;cursor:pointer}
  .vertical-slider::-moz-range-thumb{width:20px;height:20px;background:#4488ff;border-radius:50%;cursor:pointer;border:none}
  .mast-slider::-webkit-slider-thumb{background:#88cc44}
  .mast-slider::-moz-range-thumb{background:#88cc44}
  .tilt-slider::-webkit-slider-thumb{background:#ff8844}
  .tilt-slider::-moz-range-thumb{background:#ff8844}

  .viz-3d{flex:1;background:#1a1a1a;border-radius:10px;min-height:400px}
</style>
</head>
<body><div class="wrap">
<h2>Player</h2>

<div class="card">
  <div class="row">
    <div><label>Session</label><input id="sid" placeholder="paste session id"/></div>
    <div><label>Node</label>
      <select id="team">
        <option value="A">Node 1</option>
        <option value="B">Node 2</option>
      </select>
    </div>
    <div style="align-self:end"><button id="join">Join</button></div>
  </div>
  <div class="kv" id="brief">-</div>
  <div class="kv" id="joinStatus" style="margin-top:8px;font-weight:500"></div>
</div>

<div class="card">
  <h3>Antenna Controls</h3>

  <div class="antenna-control-panel">
    <!-- Azimuth bar at top -->
    <div class="azimuth-bar">
      <label>AZIMUTH</label>
      <input type="range" id="az_slider" class="azimuth-slider" min="0" max="7200" value="0">
      <input type="number" id="az_input" class="azimuth-input" min="0" max="7200" value="0">
      <span class="unit">ticks</span>
    </div>

    <!-- Main area: mast | 3D | tilt -->
    <div class="viz-container">
      <!-- Left sidebar: Mast slider -->
      <div class="sidebar">
        <label>MAST</label>
        <span style="color:#aaa;font-size:11px">9</span>
        <input type="range" id="mast_slider" class="vertical-slider mast-slider" min="1" max="9" value="1">
        <span style="color:#aaa;font-size:11px">1</span>
        <div class="value-display" id="mast_display">1</div>
      </div>

      <!-- Center: 3D visualization -->
      <div id="antenna3d-container" class="viz-3d"></div>

      <!-- Right sidebar: Tilt slider -->
      <div class="sidebar">
        <label>TILT</label>
        <span style="color:#aaa;font-size:11px">+15</span>
        <input type="range" id="tilt_slider" class="vertical-slider tilt-slider" min="-15" max="15" value="0">
        <span style="color:#aaa;font-size:11px">-15</span>
        <div class="value-display" id="tilt_display">0°</div>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <h3>RX Signal</h3>
  <div class="meter"><div id="fill" class="fill"></div></div>
  <div id="rx" class="kv">-</div>
</div>

<!-- Three.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<!-- Our custom scripts (cache-bust with version) -->
<script src="/static/js/antenna3d.js?v=5"></script>
<script src="/static/js/player.js?v=5"></script>

</div></body></html>
