<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Link Fight - Antenna Alignment Training</title>
    <link rel="stylesheet" href="/static/css/styles.css"/>
    <!-- <script src="https://unpkg.com/lucide@latest"></script> -->
    <script src="/static/js/lucide.min.js"></script>
</head>
<body>
    <div class="container container-narrow">
        <div class="hero">
            <i data-lucide="radio-tower" class="hero-icon"></i>
            <h1 class="hero-title">Link Fight</h1>
            <p class="hero-subtitle">Master antenna alignment through competitive training scenarios. Compete head-to-head to achieve optimal signal strength.</p>
            
            <div class="action-cards">
                <a href="/gm" class="action-card">
                    <i data-lucide="settings-2" class="action-card-icon"></i>
                    <div class="action-card-title">Gamemaster</div>
                    <div class="action-card-desc">Create and manage training sessions with custom scenarios</div>
                </a>
                
                <a href="/player" class="action-card">
                    <i data-lucide="gamepad-2" class="action-card-icon"></i>
                    <div class="action-card-title">Player</div>
                    <div class="action-card-desc">Join a session and compete to align your antenna</div>
                </a>
            </div>
            
            <div style="margin-top: var(--space-8);">
                <a href="/health" class="nav-link" style="display: inline-flex; justify-content: center;">
                    <i data-lucide="activity" class="nav-link-icon" style="width: 16px; height: 16px;"></i>
                    <span>System Health Check</span>
                </a>
            </div>
        </div>
    </div>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
